<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Letter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#1b1b1b;
    font-family:Georgia, serif;
    overflow:hidden;
}

/* Envelope */

.envelope{
    width:380px;
    height:250px;
    background:#e6c48f;
    border-radius:12px;
    box-shadow:0 0 30px rgba(0,0,0,.5);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.envelope h2{
    margin-bottom:15px;
}

.envelope p{
    margin-bottom:25px;
    font-size:18px;
}

.open-btn{
    padding:15px 35px;
    border:none;
    border-radius:40px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

/* Letter */

.letter{
    display:none;
    width:750px;
    max-width:92%;
    background:#fff8e7;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 40px rgba(0,0,0,.5);
}

.letter h1{
    margin-bottom:20px;
}

.letter p{
    margin-bottom:15px;
    line-height:1.7;
}

.loading{
    width:100%;
    height:22px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:25px;
}

.bar{
    width:0%;
    height:100%;
    background:#444;
}

#status{
    text-align:center;
    margin-top:10px;
}

.reveal{
    display:none;
    text-align:center;
    font-size:55px;
    font-weight:bold;
    margin:35px 0;
}

.shake{
    animation:shake .2s infinite;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    50%{transform:translateX(4px);}
    75%{transform:translateX(-4px);}
    100%{transform:translateX(0);}
}
</style>
</head>
<body>

<!-- Envelope -->

<div class="envelope" id="envelope">

    <div>

        <h2>⚠️ Important Personal Letter</h2>

        <p>Helha sahbi w matndmech</p>

        <button class="open-btn" onclick="openLetter()">
HELLLL YNAAAAA3N
        </button>

    </div>

</div>

<!-- Letter -->

<div class="letter" id="letter">

<h1>Dear Friend,</h1>

<

<div class="loading">
    <div class="bar" id="bar"></div>
</div>

<p id="status">Preparing heartfelt message...</p>

<div class="reveal" id="reveal">
    TECHEDLI ZEBI
</div>

<p style="text-align:center;"><br>
nakes mel.wabna 😂
</p>

</div>

<script>

function openLetter(){

    document.getElementById("envelope").style.display = "none";
    document.getElementById("letter").style.display = "block";

    let width = 0;

    const bar = document.getElementById("bar");

    const interval = setInterval(() => {

        width++;

        bar.style.width = width + "%";

        if(width >= 100){

            clearInterval(interval);

            document.getElementById("status").innerHTML =
            "Message successfully loaded...";

            setTimeout(() => {

                document.getElementById("reveal").style.display = "block";

                document.body.classList.add("shake");

                setTimeout(() => {
                    document.body.classList.remove("shake");
                },2000);

            },1000);
        }

    },50);
}
</script>

</body>
</html>
